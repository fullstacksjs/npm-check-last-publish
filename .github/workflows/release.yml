name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - next

jobs:
  release:
    concurrency: ci-${{ github.ref }}
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Release
        run: npx semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
